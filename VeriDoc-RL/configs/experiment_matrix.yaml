project:
  name: "VeriDoc-RL"
  objective: "Verifier-guided RLVR for insurance application form extraction and rule validation"

base_model:
  mvp: "Qwen2.5-3B-Instruct"
  full: "Qwen2.5-7B-Instruct"

data:
  task_scope:
    - "insurance_application_form_extraction"
    - "insurance_application_form_validation"
  input_modalities:
    - "pdf_page"
    - "ocr_tokens"
  buckets:
    template_family:
      - "template_a"
      - "template_b"
      - "template_c"
    ocr_noise_level:
      - "low"
      - "medium"
      - "high"
    hard_case_type:
      - "field_missing"
      - "smudged_text"
      - "occluded_region"
      - "checkbox_conflict"
    rule_complexity:
      - "single_field"
      - "cross_field"
      - "conditional_checkbox"
  error_taxonomy:
    - "missing_field"
    - "wrong_value"
    - "normalization_error"
    - "relation_error"
    - "checkbox_logic_error"
    - "rule_misfire"
    - "ocr_fragility"
    - "invalid_schema"

training_stages:
  - name: "sft_baseline"
    method: "lora_sft"
    goal: "produce valid fields-plus-validations output"
  - name: "preference_optimization"
    method: "dpo"
    goal: "train on verifier-ranked candidate pairs"
  - name: "rlvr"
    method: "grpo_or_rloo"
    goal: "optimize composite verifier reward"

training_runtime:
  backend: "verl"
  prompt_template: "veridoc_v1"
  common:
    project_name: "VeriDoc-RL"
    python_bin: "python3"
    n_gpus_per_node: 1
    nnodes: 1
    prompt_key: "prompt"
    max_prompt_length: 2048
    max_response_length: 1024
    train_batch_size: 32
    val_batch_size: 32
    filter_overlong_prompts: false
    truncation: "left"
    rollout_engine: "vllm"
    rollout_mode: "sync"
    rollout_tensor_parallel_size: 1
    rollout_gpu_memory_utilization: 0.5
    ppo_mini_batch_size: 16
    ppo_micro_batch_size_per_gpu: 4
    log_prob_micro_batch_size_per_gpu: 4
    save_freq: 10
    test_freq: 10
    reward_manager: "naive"
  phases:
    phase_b_dpo:
      algorithm: "dpo"
      reward_profile: "default"
      epochs: 1
      learning_rate: 0.000001
      beta: 0.1
    phase_c_grpo:
      algorithm: "grpo"
      reward_profile: "rlvr"
      epochs: 1
      learning_rate: 0.000001
      rollout_n: 4
      kl_coef: 0.02
    phase_c_rloo:
      algorithm: "rloo"
      reward_profile: "rlvr"
      epochs: 1
      learning_rate: 0.000001
      rollout_n: 4
      kl_coef: 0.02

reward:
  components:
    schema_reward: 0.20
    field_match_reward: 0.30
    normalization_reward: 0.15
    cross_field_consistency_reward: 0.20
    checkbox_logic_reward: 0.10
    ocr_robustness_reward: 0.05

evaluation:
  primary_metrics:
    - "field_f1"
    - "form_exact_match"
    - "rule_pass_rate"
    - "invalid_json_rate"
    - "ocr_noise_bucket_performance"
  ablations:
    - "sft_only"
    - "sft_plus_dpo"
    - "sft_plus_rlvr"
    - "sft_plus_rlvr_without_cross_field_consistency"
    - "sft_plus_rlvr_without_checkbox_logic"
